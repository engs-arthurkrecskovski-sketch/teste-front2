<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agendar Serviço - REAL CARS</title>
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="agendamento.css">
</head>
<body>
    <nav class="sidebar">
        <h2>🔧 REAL<span>CARS</span></h2>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="cadastro.html">Clientes</a></li>
            <li><a href="agendamento.html" class="active">Agendamento</a></li>
            <li><a href="historico.html">Histórico</a></li>
        </ul>
    </nav>

    <main>
        <div class="agendamento-content">
            <h1>Novo Agendamento</h1>
            
            <div class="box-agendar">
                <div class="form-group">
                    <label>Selecionar Cliente</label>
                    <select>
                        <option value="">Selecione um cliente cadastrado...</option>
                        <option>João Silva (Civic - PLK9090)</option>
                        <option>Maria Oliveira (Onix - ABC1234)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Tipo de Serviço</label>
                    <select>
                        <option>Revisão Geral</option>
                        <option>Troca de Óleo</option>
                        <option>Alinhamento e Balanceamento</option>
                        <option>Sistema de Freios</option>
                        <option>Outros (Descrever abaixo)</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date">
                    </div>
                    <div class="form-group">
                        <label>Horário</label>
                        <input type="time">
                    </div>
                </div>

                <div class="form-group">
                    <label>Valor Estimado (R$)</label>
                    <input type="number" step="0.01" placeholder="0,00">
                </div>

                <div class="form-group">
                    <label>Observações / Sintomas</label>
                    <textarea rows="3" placeholder="Ex: Barulho na suspensão dianteira..."></textarea>
                </div>

                <a href="historico.html" class="btn-confirmar">Finalizar e Salvar Agendamento</a>
            </div>
        </div>
    </main>
</body>
</html>
