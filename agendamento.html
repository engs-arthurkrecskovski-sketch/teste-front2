<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Serviço - REAL CARS</title>
    
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="agendamento.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-text-container">
            <i class="fas fa-tools logo-icon-red"></i>
            <h2>REAL<span>CARS</span></h2>
        </div>
        <ul>
            <li><a href="index.html"><i class="fas fa-chart-line"></i> Início</a></li>
            <li><a href="cadastro.html"><i class="fas fa-users"></i> Clientes</a></li>
            <li><a href="agendamento.html" class="active"><i class="fas fa-calendar-alt"></i> Agendamento</a></li>
            <li><a href="historico.html"><i class="fas fa-history"></i> Histórico</a></li>
        </ul>
    </nav>

    <main>
        <div class="agendamento-content">
            
            <div class="header-page">
                <i class="fas fa-calendar-plus header-icon"></i>
                <h1>Novo Agendamento</h1>
                <p>Reserve o horário para o serviço</p>
            </div>
            
            <div class="box-agendar">
                
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Cliente Selecionado</label>
                    <select>
                        <option>João Silva (Civic - PLK9090)</option>
                        <option>Maria Oliveira (Onix - ABC1234)</option>
                        <option>Murilo Grando (Fusca - AJI6154)</option>
                        <option>Dionatan Inhoato (BMW X5 - CRF1514)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-oil-can"></i> Tipo de Serviço</label>
                    <select>
                        <option>Revisão Geral</option>
                        <option>Troca de Óleo</option>
                        <option>Sistema de Freios</option>
                        <option>Suspensão</option>
                        <option>Outros</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-calendar-day"></i> Data</label>
                        <input type="date">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> Horário</label>
                        <input type="time">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-comment-dots"></i> Observações</label>
                    <textarea rows="3" placeholder="Detalhes adicionais sobre o veículo ou serviço..."></textarea>
                </div>

                <a href="historico.html" class="btn-confirmar">
                    FINALIZAR AGENDAMENTO <i class="fas fa-check"></i>
                </a>
            </div>
        </div>
    </main>

    <a href="https://wa.me/5542999809581" target="_blank">
        <img src="unnamed.jpg" class="whatsapp-float" alt="WhatsApp">
    </a>

</body>
</html>
